{%- comment -%}
  Inject pangu.js so Chinese / English / digit boundaries get auto 1/4-em spacing
  on browsers that do not yet support CSS `text-autospace` (Firefox, older Safari).
  pangu mutates DOM after load; chrome 119+ uses CSS path and pangu is a no-op safety net.
{%- endcomment -%}
<script
  defer
  src="https://cdn.jsdelivr.net/npm/pangu@4.0.7/dist/browser/pangu.min.js"
></script>
<script>
  document.addEventListener('DOMContentLoaded', function () {
    if (window.pangu && typeof window.pangu.spacingElementByClassName === 'function') {
      window.pangu.spacingElementByClassName('content');
      window.pangu.spacingElementById('toc');
    }
  });
</script>
