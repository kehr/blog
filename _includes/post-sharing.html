<!-- Post sharing: social-share.js handles Twitter/WeChat/Weibo; keep Chirpy's copy-link. -->

<link
  rel="stylesheet"
  href="https://cdn.jsdelivr.net/npm/social-share.js@1.0.16/dist/css/share.min.css"
/>

<style>
  .share-icons .social-share { display: inline-flex; align-items: center; }
  .share-icons .social-share .social-share-icon {
    width: 24px;
    height: 24px;
    line-height: 24px;
    font-size: 12px;
    margin: 0 4px;
    border-width: 1px;
  }
  #download-card-btn.share-icon-btn {
    width: 24px;
    height: 24px;
    padding: 0;
    margin: 0 4px;
    border-radius: 50%;
    border: 1px solid #5856d6;
    background: transparent;
    color: #5856d6;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    line-height: 1;
    vertical-align: middle;
    transition: background 0.15s ease, color 0.15s ease;
  }
  #download-card-btn.share-icon-btn:hover {
    background: #5856d6;
    color: #fff;
  }
  #download-card-btn.share-icon-btn svg { display: block; }
</style>

<div class="share-wrapper d-flex align-items-center">
  <span class="share-label text-muted">{{ site.data.locales[include.lang].post.share }}</span>
  <span class="share-icons d-flex align-items-center">
    <div
      class="social-share"
      data-sites="twitter,wechat,weibo"
      data-url="{{ page.url | absolute_url }}"
      data-title="{{ page.title | escape }} - {{ site.title | escape }}"
      data-wechat-qrcode-title="分享到微信"
      data-wechat-qrcode-helper="用微信扫一扫"
    ></div>

    <button
      id="download-card-btn"
      type="button"
      aria-label="Download share card"
      class="share-icon-btn"
      data-bs-toggle="tooltip"
      data-bs-placement="top"
      title="下载分享卡片"
    >
      <svg width="11" height="11" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" focusable="false">
        <path d="M14.002 5.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
        <path d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/>
      </svg>
    </button>

    <button
      id="copy-link"
      aria-label="Copy link"
      class="btn small"
      data-bs-toggle="tooltip"
      data-bs-placement="top"
      title="{{ site.data.locales[include.lang].post.button.share_link.title }}"
      data-title-succeed="{{ site.data.locales[include.lang].post.button.share_link.succeed }}"
    >
      <i class="fa-fw fas fa-link pe-none fs-6"></i>
    </button>
  </span>
</div>

{% include post-card.html %}

<!-- Mobile floating CTA: appears after scrolling past 2/3 of the article, hides on scroll-up. -->
<button
  id="floating-share-card-btn"
  type="button"
  class="floating-share-card-btn"
  aria-label="生成分享卡片"
>
  <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true" focusable="false">
    <path d="M14.002 5.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0z"/>
    <path d="M2 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2H2zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1h12z"/>
  </svg>
  <span>生成分享卡片</span>
</button>

<style>
  .floating-share-card-btn {
    --floating-share-bg: rgba(255, 255, 255, 0.48);
    --floating-share-fg: #1d1d1f;
    --floating-share-border: rgba(0, 0, 0, 0.05);
    --floating-share-shadow: 0 4px 14px rgba(15, 23, 42, 0.05), 0 1px 2px rgba(15, 23, 42, 0.03);
    position: fixed;
    left: 16px;
    right: 16px;
    bottom: calc(20px + env(safe-area-inset-bottom, 0px));
    display: none;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 14px 22px;
    background: var(--floating-share-bg);
    -webkit-backdrop-filter: saturate(180%) blur(28px);
    backdrop-filter: saturate(180%) blur(28px);
    color: var(--floating-share-fg);
    border: 1px solid var(--floating-share-border);
    border-radius: 980px;
    font-size: 15px;
    font-weight: 500;
    letter-spacing: 0.01em;
    box-shadow: var(--floating-share-shadow);
    opacity: 0;
    visibility: hidden;
    transform: translateY(24px);
    z-index: 1080;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.28s ease, transform 0.28s ease, visibility 0.28s;
  }
  .floating-share-card-btn.is-visible {
    opacity: 1;
    visibility: visible;
    transform: translateY(0);
  }
  .floating-share-card-btn:active {
    transform: translateY(0) scale(0.98);
  }
  .floating-share-card-btn svg { flex-shrink: 0; }

  html[data-mode='dark'] .floating-share-card-btn {
    --floating-share-bg: rgba(44, 44, 46, 0.42);
    --floating-share-fg: #f5f5f7;
    --floating-share-border: rgba(255, 255, 255, 0.08);
    --floating-share-shadow: 0 4px 14px rgba(0, 0, 0, 0.22), 0 1px 2px rgba(0, 0, 0, 0.14);
  }
  @media (prefers-color-scheme: dark) {
    html:not([data-mode]) .floating-share-card-btn,
    html[data-mode='dark'] .floating-share-card-btn {
      --floating-share-bg: rgba(44, 44, 46, 0.42);
      --floating-share-fg: #f5f5f7;
      --floating-share-border: rgba(255, 255, 255, 0.08);
      --floating-share-shadow: 0 4px 14px rgba(0, 0, 0, 0.22), 0 1px 2px rgba(0, 0, 0, 0.14);
    }
    html[data-mode='light'] .floating-share-card-btn {
      --floating-share-bg: rgba(255, 255, 255, 0.48);
      --floating-share-fg: #1d1d1f;
      --floating-share-border: rgba(0, 0, 0, 0.05);
      --floating-share-shadow: 0 4px 14px rgba(15, 23, 42, 0.05), 0 1px 2px rgba(15, 23, 42, 0.03);
    }
  }

  @media (max-width: 768px) {
    .floating-share-card-btn { display: flex; }
    body.floating-share-visible #back-to-top {
      opacity: 0 !important;
      visibility: hidden !important;
      pointer-events: none;
    }
  }
</style>

<script>
  (function () {
    var btn = document.getElementById('floating-share-card-btn');
    var target = document.getElementById('download-card-btn');
    if (!btn || !target) return;

    var mq = window.matchMedia('(max-width: 768px)');
    if (!mq.matches) return;

    var lastY = window.scrollY;
    var ticking = false;
    var threshold = 0.66;
    var jitter = 4;

    function update() {
      var y = window.scrollY;
      var doc = document.documentElement;
      var maxY = (doc.scrollHeight - doc.clientHeight) || 1;
      var progress = y / maxY;
      var delta = y - lastY;

      if (progress < threshold) {
        btn.classList.remove('is-visible');
      } else if (delta < -jitter) {
        btn.classList.remove('is-visible');
      } else if (delta > jitter || !btn.classList.contains('is-visible')) {
        btn.classList.add('is-visible');
      }

      document.body.classList.toggle(
        'floating-share-visible',
        btn.classList.contains('is-visible')
      );

      lastY = y;
      ticking = false;
    }

    window.addEventListener('scroll', function () {
      if (!ticking) {
        window.requestAnimationFrame(update);
        ticking = true;
      }
    }, { passive: true });

    btn.addEventListener('click', function () {
      target.click();
    });
  })();
</script>

<script
  defer
  src="https://cdn.jsdelivr.net/npm/social-share.js@1.0.16/dist/js/social-share.min.js"
></script>
